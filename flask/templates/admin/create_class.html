<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Kelas Baru</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary mb-3"><i class="fas fa-arrow-left"></i> Kembali</a>
            <h1 class="h3 mb-4 text-dark">Buat Kelas Baru</h1>
            <div class="card shadow">
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="nama_kelas" class="form-label fw-bold">Nama Kelas*</label>
                            <input type="text" class="form-control" id="nama_kelas" name="nama_kelas" placeholder="Contoh: Pemrograman Web Lanjutan" required>
                        </div>
                        <div class="mb-3">
                            <label for="kode_matkul" class="form-label fw-bold">Kode Mata Kuliah*</label>
                            <input type="text" class="form-control" id="kode_matkul" name="kode_matkul" placeholder="Contoh: IF-401" required>
                        </div>
                        <div class="mb-3">
                            <label for="id_dosen" class="form-label fw-bold">Dosen Pengampu*</label>
                            <select class="form-select" id="id_dosen" name="id_dosen" required>
                                <option value="" disabled selected>-- Pilih Dosen --</option>
                                {% for dosen in dosen_list %}
                                <option value="{{ dosen.id_dosen }}">{{ dosen.nama }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <hr>
                        <button type="submit" class="btn btn-primary">Simpan Kelas</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
