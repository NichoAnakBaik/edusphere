<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atur NIP Dosen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <a href="{{ url_for('manage_users') }}" class="btn btn-secondary mb-3"><i class="fas fa-arrow-left"></i> Kembali</a>
            <h1 class="h3">Atur NIP untuk Dosen <br><span class="text-primary">{{ user_data.username }}</span></h1>
            
            <div class="card shadow">
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label for="nip" class="form-label fw-bold">Nomor Induk Pegawai (NIP)*</label>
                            <input type="text" class="form-control" id="nip" name="nip" value="{{ user_data.nip or '' }}" required>
                            <div class="form-text">Dosen akan melengkapi sisa profilnya sendiri.</div>
                        </div>
                        <hr>
                        <button type="submit" class="btn btn-primary">Simpan NIP</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
